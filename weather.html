<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #7a4bff, #9f56ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            transition: background-image 0.5s ease-in-out;
            animation: fadeInBackground 3s ease-out;
        }

        @keyframes fadeInBackground {
            0% {
                background: linear-gradient(135deg, #7a4bff, #9f56ff);
            }
            50% {
                background: linear-gradient(135deg, #9f56ff, #7a4bff);
            }
        }

        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 30%;
            min-width: 300px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            opacity: 0;
            animation: fadeInContainer 1s ease-in forwards;
        }

        @keyframes fadeInContainer {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ffffff;
            animation: slideInFromTop 1s ease-out;
        }

        @keyframes slideInFromTop {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(0);
            }
        }

        input,
        button {
            padding: 15px;
            width: 85%;
            font-size: 1.1em;
            border-radius: 8px;
            margin: 10px 0;
            outline: none;
            border: 1px solid #ddd;
        }
        button{
            width: 50%;
        }

        input:focus {
            border-color: #9f56ff;
        }

        button{
            background: linear-gradient(135deg, #9f56ff, #7a4bff);
            color: white;
            cursor: pointer;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            transition: background 0.25s ease, transform 0.2s ease;
        }

        @keyframes pulseButton {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.1);
            }
        }

        button:hover {
            background: linear-gradient(135deg, #7a4bff, #9f56ff);
            transform: scale(1.05);
        }

        #weather {
            margin-top: 30px;
            font-size: 1.2em;
            opacity: 0;
            animation: fadeInWeather 1s ease-in forwards;
        }

        @keyframes fadeInWeather {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .error {
            color: #ff4040;
            animation: shakeError 0.5s ease-in-out;
        }

        @keyframes shakeError {
            0% {
                transform: translateX(-10px);
            }
            50% {
                transform: translateX(10px);
            }
            100% {
                transform: translateX(-10px);
            }
        }

        .weather-icon{
            width: 120px;
            margin: 20px 0;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
        }

        @keyframes bounceIcon {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(0);
            }
        }
        .toast-notification {
        position: fixed;
        bottom: 25px;
        right: 25px;
        min-width: 260px;
        max-width: 320px;
        padding: 14px 18px;
        border-radius: 8px;
        color: #fff;
        font-size: 15px;
        font-weight: 500;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.4s ease;
        z-index: 9999;
    }

    /* Visible state */
    .toast-notification.show {
        opacity: 1;
        transform: translateY(0);
    }

    /* Error toast */
    .toast-notification.error {
        background: linear-gradient(135deg, #e53935, #d32f2f);
    }

    /* Success toast */
    .toast-notification.success {
        background: linear-gradient(135deg, #43a047, #2e7d32);
    }

    /* Optional warning */
    .toast-notification.warning {
        background: linear-gradient(135deg, #f9a825, #f57f17);
    }
    .btn-group{
        display:grid;
        grid-template-columns: repeat(2,1fr);
        gap:12px;
        margin-top:15px;
    }

    .btn-group button{
        flex:1;
        width:auto;
    }

    .history-section{
        margin-top:20px;
    }

    #history{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
        justify-content:center;
        margin-top:10px;
    }

    .history-btn{
        padding:8px 14px;
        border:none;
        border-radius:20px;
        background:#ffffff22;
        color:white;
        cursor:pointer;
        transition:0.3s;
    }

    .history-btn:hover{
        background:#ffffff44;
    }

    #weather{
        margin-top:25px;
    }

    #weather h2{
        margin-bottom:10px;
    }

    @media(max-width:600px){
        .container{
            width:90%;
            max-width:95%;
            padding:25px 18px;
        }
        .btn-group{
            grid-template-columns:1fr;
        }
        .btn-group button{width:100%;}
        input{width:90%;}
        button{width:90%;}
    }
    .history-top{
        display:flex;
        justify-content:center;
        align-items:center;
        gap:10px;
    }

    .clear-history-btn{
        width: auto !important;
        min-width: auto;
        padding: 4px 8px;
        background: transparent;
        border: none;
        color: white;
        font-size: 26px;
        cursor: pointer;
        border-radius: 8px;
        transition: 0.3s ease;
    }

    .clear-history-btn:hover{
        background: rgba(255,255,255,0.12);
        transform: scale(1.1);
    }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌤 Weather App</h1>
        <input type="text" id="city" placeholder="Enter city name">
        <div class="btn-group">
            <button onclick="checkCity()">Search</button>
            <button onclick="getLocationWeather()">📍 My Location</button>
            <button onclick="startVoiceSearch()">🎤 Voice</button>
            <button onclick="clearWeather()">✖ Clear</button>
        </div>
        <div id="weather"></div>
        <div class="history-section" id="historySection">
            <div class="history-top">
                <h3>Recent Searches</h3>
                <button class="clear-history-btn" onclick="clearHistory()">🗑️</button>
            </div>
            <div id="history"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
	<script src="./weather.js">//`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=6ed570ac911dad2a255e2965a53ced74&units=metric`</script>
</body>
</html>
